name: Android CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: dicy-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

  smoke-test:
    name: Boot emulator + launch app
    runs-on: ubuntu-22.04
    needs: build
    permissions:
      contents: read
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnostic - host capabilities
        run: |
          echo "Runner OS:"
          cat /etc/os-release || true
          echo "---"
          echo "KVM device:"
          ls -la /dev/kvm || echo "no /dev/kvm"
          echo "---"
          echo "CPU virt flags:"
          egrep -c '(vmx|svm)' /proc/cpuinfo || echo "no vmx/svm in cpuinfo"
          echo "---"
          echo "Disk free:"
          df -h /
          echo "---"
          echo "Memory:"
          free -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: dicy-release-apk
          path: ./apk

      - name: Run app on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: default
          arch: x86_64
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot -camera-back none
          disable-animations: true
          script: |
            set -x
            echo "::group::Device info"
            adb devices
            adb shell getprop ro.build.version.sdk || true
            adb shell getprop ro.product.cpu.abi || true
            echo "::endgroup::"

            echo "::group::Start logcat buffer"
            adb logcat -c || true
            adb logcat -v time > logcat.txt &
            LOGCAT_PID=$!
            echo "::endgroup::"

            echo "::group::Install APK"
            ls -la apk/
            adb install -r -d apk/app-release.apk
            echo "::endgroup::"

            echo "::group::Launch MainActivity"
            adb shell am start -W -n com.dicy/.MainActivity || true
            echo "::endgroup::"

            echo "::group::Wait for process up to 30s"
            APP_PID=""
            for i in $(seq 1 30); do
              APP_PID=$(adb shell pidof com.dicy 2>/dev/null | tr -d '\r' || true)
              if [ -n "$APP_PID" ]; then
                echo "App pid=$APP_PID after ${i}s"
                break
              fi
              sleep 1
            done
            echo "::endgroup::"

            # let JS bundle evaluate and first screen render
            sleep 15

            echo "::group::Capture screenshot"
            adb shell screencap -p /sdcard/screen.png || true
            adb pull /sdcard/screen.png ./screen.png || true
            ls -la screen.png || echo "no screenshot"
            echo "::endgroup::"

            echo "::group::Stop logcat collection"
            kill $LOGCAT_PID 2>/dev/null || true
            sleep 1
            wc -l logcat.txt || true
            echo "::endgroup::"

            FAIL=0

            echo "::group::Check for fatal crashes"
            if grep -E "FATAL EXCEPTION|AndroidRuntime: FATAL|libc.*Fatal signal|tombstoned" logcat.txt; then
              echo "::error::App crashed during smoke test"
              grep -B2 -A40 -E "FATAL EXCEPTION|AndroidRuntime: FATAL|Fatal signal" logcat.txt | head -300
              FAIL=1
            fi
            echo "::endgroup::"

            echo "::group::Check process still alive"
            FINAL_PID=$(adb shell pidof com.dicy 2>/dev/null | tr -d '\r' || true)
            if [ -z "$FINAL_PID" ]; then
              echo "::error::App process not running at end of smoke test"
              echo "Last 200 logcat lines:"
              tail -200 logcat.txt
              FAIL=1
            else
              echo "App still running, pid=$FINAL_PID"
            fi
            echo "::endgroup::"

            exit $FAIL

      - name: Upload smoke-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output
          path: |
            screen.png
            logcat.txt
          retention-days: 14
          if-no-files-found: ignore
