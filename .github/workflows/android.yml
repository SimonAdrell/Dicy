name: Android CI

on:
  push:
    branches: [main, master, "claude/**"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: dicy-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

  smoke-test:
    name: Boot emulator + launch app
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: dicy-release-apk
          path: ./apk

      - name: Run app on emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          target: google_apis
          arch: x86_64
          profile: pixel_5
          ram-size: 4096M
          disk-size: 6G
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot
          disable-animations: true
          script: |
            set -e
            echo "::group::Install APK"
            adb install -r apk/app-release.apk
            echo "::endgroup::"

            echo "::group::Launch MainActivity"
            adb shell am start -W -n com.dicy/.MainActivity
            echo "::endgroup::"

            echo "::group::Wait for process"
            for i in $(seq 1 15); do
              if adb shell pidof com.dicy >/dev/null 2>&1; then
                echo "App pid=$(adb shell pidof com.dicy | tr -d '\r') after ${i}s"
                break
              fi
              sleep 1
            done
            echo "::endgroup::"

            # let JS bundle evaluate and first screen render
            sleep 12

            echo "::group::Capture screenshot + logcat"
            adb shell screencap -p /sdcard/screen.png
            adb pull /sdcard/screen.png ./screen.png
            adb logcat -d > logcat.txt
            echo "::endgroup::"

            echo "::group::Check for fatal crashes"
            if grep -E "FATAL EXCEPTION|AndroidRuntime: FATAL|libc.*Fatal signal|tombstoned" logcat.txt; then
              echo "::error::App crashed during smoke test"
              grep -B2 -A30 -E "FATAL EXCEPTION|AndroidRuntime: FATAL|Fatal signal" logcat.txt | head -200
              exit 1
            fi
            echo "::endgroup::"

            echo "::group::Confirm process still alive"
            if ! adb shell pidof com.dicy >/dev/null 2>&1; then
              echo "::error::App process died after launch"
              tail -200 logcat.txt
              exit 1
            fi
            echo "App is running cleanly"
            echo "::endgroup::"

      - name: Upload smoke-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output
          path: |
            screen.png
            logcat.txt
          retention-days: 14
          if-no-files-found: warn
