name: Android CI

on:
  workflow_dispatch:
  # Add the `smoke-test` label to a PR to fire a one-shot smoke run
  # against the PR's head ref. The label can be removed and re-added
  # to retrigger.
  pull_request:
    types: [labeled]

jobs:
  build:
    name: Build release APK
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.label.name == 'smoke-test')
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3.2.2

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: dicy-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 14

  smoke-test:
    name: Boot emulator + launch app
    runs-on: ubuntu-22.04
    needs: build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'pull_request' && github.event.label.name == 'smoke-test')
    permissions:
      contents: write
      pull-requests: write
    timeout-minutes: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Diagnostic - host capabilities
        run: |
          echo "Runner OS:"
          cat /etc/os-release || true
          echo "---"
          echo "KVM device:"
          ls -la /dev/kvm || echo "no /dev/kvm"
          echo "---"
          echo "CPU virt flags:"
          egrep -c '(vmx|svm)' /proc/cpuinfo || echo "no vmx/svm in cpuinfo"
          echo "---"
          echo "Disk free:"
          df -h /
          echo "---"
          echo "Memory:"
          free -h

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Download release APK
        uses: actions/download-artifact@v4
        with:
          name: dicy-release-apk
          path: ./apk

      - name: Run app on emulator
        uses: reactivecircus/android-emulator-runner@50986b1464923454c95e261820bc626f38490ec0 # v2.27.0
        with:
          api-level: 33
          target: default
          arch: x86_64
          emulator-options: -no-window -no-audio -no-boot-anim -gpu swiftshader_indirect -no-snapshot -camera-back none
          disable-animations: true
          script: |
            # NOTE: this script intentionally does NOT use `set -e`. Past runs
            # had the emulator-runner action lose ADB shortly after launch,
            # which would abort the script before it captured the verdict.
            # Now: launch, capture milestones + screenshot immediately, then
            # do best-effort post-launch work. The job's exit code reflects
            # ONLY the milestone grep on logcat — not adb survival.
            set +e
            set -x

            echo "::group::Device info"
            adb devices
            adb shell getprop ro.build.version.sdk
            adb shell getprop ro.product.cpu.abi
            echo "::endgroup::"

            echo "::group::Start logcat buffer"
            adb logcat -c
            adb logcat -v time > logcat.txt &
            LOGCAT_PID=$!
            echo "::endgroup::"

            echo "::group::Install APK"
            ls -la apk/
            adb install -r -d apk/app-release.apk
            INSTALL_RC=$?
            if [ "$INSTALL_RC" -ne 0 ]; then
              echo "::error::adb install failed (rc=$INSTALL_RC)"
              kill $LOGCAT_PID 2>/dev/null
              exit 1
            fi
            echo "::endgroup::"

            echo "::group::Launch MainActivity (-W blocks until Displayed)"
            adb shell am start -W -n com.dicy/.MainActivity
            echo "::endgroup::"

            # JS evaluate fires within milliseconds of Displayed historically,
            # but give it a small buffer in case the emulator is slow.
            sleep 5

            echo "::group::Capture screenshot (immediately after launch — adb may die later)"
            adb shell screencap -p /sdcard/screen.png
            adb pull /sdcard/screen.png ./screen.png
            ls -la screen.png || echo "no screenshot"
            echo "::endgroup::"

            # Best-effort: let more logs accumulate for richer diagnostics on
            # failure. If adb dies here, we already have screenshot + the
            # critical milestone window in logcat.
            echo "::group::Best-effort: 10s for richer logs"
            sleep 10
            echo "::endgroup::"

            echo "::group::Stop logcat collection"
            kill $LOGCAT_PID 2>/dev/null
            sleep 1
            wc -l logcat.txt
            echo "::endgroup::"

            echo "::group::Verdict from logcat (the only thing the exit code depends on)"
            STARTED=0
            grep -q "Displayed com.dicy/.MainActivity" logcat.txt \
              && { echo "  [ok] MainActivity Displayed"; STARTED=$((STARTED + 1)); } \
              || echo "  [missing] MainActivity Displayed"
            grep -qE 'ReactNativeJS.*Running "dicy"' logcat.txt \
              && { echo "  [ok] ReactNativeJS evaluated entry module"; STARTED=$((STARTED + 1)); } \
              || echo "  [missing] ReactNativeJS Running \"dicy\""
            FATAL=0
            if grep -E "FATAL EXCEPTION" logcat.txt | grep -q "com.dicy"; then
              echo "::error::com.dicy hit a FATAL EXCEPTION"
              grep -B2 -A40 -E "FATAL EXCEPTION" logcat.txt | head -300
              FATAL=1
            elif grep -qE "AndroidRuntime.*com\.dicy.*FATAL" logcat.txt; then
              echo "::error::com.dicy hit an AndroidRuntime FATAL"
              grep -B2 -A40 -E "AndroidRuntime.*com\.dicy" logcat.txt | head -300
              FATAL=1
            fi
            echo "::endgroup::"

            if [ "$STARTED" -eq 2 ] && [ "$FATAL" -eq 0 ]; then
              echo "VERDICT: PASS — app boot verified"
              exit 0
            fi
            echo "::error::VERDICT: FAIL — startup milestones not reached or fatal hit"
            echo "Last 200 logcat lines:"
            tail -200 logcat.txt
            exit 1

      - name: Upload smoke-test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-test-output
          path: |
            screen.png
            logcat.txt
          retention-days: 14
          if-no-files-found: ignore

      - name: Write smoke verdict to job summary
        if: always()
        run: |
          set +e
          {
            echo "## Android smoke-test"
            echo ""
            echo "Commit: \`${{ github.sha }}\`  "
            echo "Job status: \`${{ job.status }}\`  "
            echo ""
            if [ -f logcat.txt ]; then
              ACT="missing"; JS="missing"; FATAL_DICY="none"
              grep -q "Displayed com.dicy/.MainActivity" logcat.txt && ACT="ok"
              grep -qE 'ReactNativeJS.*Running "dicy"' logcat.txt && JS="ok"
              if grep -E "FATAL EXCEPTION" logcat.txt | grep -q "com.dicy"; then
                FATAL_DICY=$(grep -A1 -E "FATAL EXCEPTION" logcat.txt | grep "com.dicy" | head -1)
              fi
              if [ "$ACT" = "ok" ] && [ "$JS" = "ok" ] && [ "$FATAL_DICY" = "none" ]; then
                echo "### Verdict: PASS"
              else
                echo "### Verdict: FAIL"
              fi
              echo ""
              echo "| Check | Result |"
              echo "| --- | --- |"
              echo "| MainActivity Displayed | \`$ACT\` |"
              echo "| ReactNativeJS Running \"dicy\" | \`$JS\` |"
              echo "| com.dicy FATAL EXCEPTION | \`$FATAL_DICY\` |"
              echo ""
              echo "_Note: job-status \`failure\` with verdict PASS usually means the emulator-runner action lost ADB after launch — the app itself booted. See CLAUDE.md._"
            else
              echo "### Verdict: NO LOGCAT (smoke step never produced logcat.txt)"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Comment smoke verdict on PR
        if: always() && github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          ACT="missing"; JS="missing"; FATAL_DICY="none"
          if [ -f logcat.txt ]; then
            grep -q "Displayed com.dicy/.MainActivity" logcat.txt && ACT="ok"
            grep -qE 'ReactNativeJS.*Running "dicy"' logcat.txt && JS="ok"
            if grep -E "FATAL EXCEPTION" logcat.txt | grep -q "com.dicy"; then
              FATAL_DICY=$(grep -A1 -E "FATAL EXCEPTION" logcat.txt | grep "com.dicy" | head -1)
            fi
          else
            ACT="no-logcat"; JS="no-logcat"
          fi
          if [ "$ACT" = "ok" ] && [ "$JS" = "ok" ] && [ "$FATAL_DICY" = "none" ]; then
            VERDICT="PASS"
          else
            VERDICT="FAIL"
          fi
          BODY=$(printf "**Android smoke-test %s** for \`%s\`\n\nJob status: \`%s\`\nRun: %s\n\n- MainActivity Displayed: \`%s\`\n- ReactNativeJS Running \"dicy\": \`%s\`\n- com.dicy FATAL EXCEPTION: \`%s\`\n" \
            "$VERDICT" "$SHA_SHORT" "${{ job.status }}" "$RUN_URL" "$ACT" "$JS" "$FATAL_DICY")
          PAYLOAD=$(BODY="$BODY" python3 -c "import json,os;print(json.dumps({'body': os.environ['BODY']}))")
          curl -sSL -X POST \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/issues/$PR_NUMBER/comments" \
            -d "$PAYLOAD" | head -c 200; echo

      - name: Publish smoke-test output to release (for unauth access)
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Best-effort: don't let release-API flakes mask the verdict.
          set +e
          TAG="ci-smoke-latest"
          REPO="${{ github.repository }}"
          curl -fsSL -X GET -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/releases/tags/$TAG" | \
            python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('id',''))" > /tmp/relid.txt
          REL_ID=$(cat /tmp/relid.txt)
          if [ -n "$REL_ID" ]; then
            curl -fsSL -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/releases/$REL_ID"
          fi
          curl -fsSL -X DELETE -H "Authorization: Bearer $GH_TOKEN" \
            "https://api.github.com/repos/$REPO/git/refs/tags/$TAG"
          REL=$(curl -sSL -X POST -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$REPO/releases" \
            -d "{\"tag_name\":\"$TAG\",\"target_commitish\":\"${{ github.sha }}\",\"name\":\"CI smoke-test latest (${{ github.sha }})\",\"body\":\"Auto-published smoke-test output for run ${{ github.run_id }}\",\"draft\":false,\"prerelease\":true}")
          UPLOAD_URL=$(echo "$REL" | python3 -c "import sys,json;d=json.load(sys.stdin);print(d.get('upload_url','').split('{')[0])" 2>/dev/null)
          if [ -n "$UPLOAD_URL" ]; then
            for f in logcat.txt screen.png; do
              if [ -f "$f" ]; then
                CT=$([ "$f" = "screen.png" ] && echo "image/png" || echo "text/plain")
                curl -fsSL -X POST -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Content-Type: $CT" \
                  --data-binary "@$f" \
                  "$UPLOAD_URL?name=$f" >/dev/null && echo "uploaded $f"
              fi
            done
          else
            echo "::warning::Release create returned no upload_url; verdict is still in step summary + PR comment"
          fi
          exit 0
